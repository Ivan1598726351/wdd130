<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Ivan Veršić">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="Basic HTML structure" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li>
                <a href="https://www.wikipedia.org/">wikipedia</a>
            </li>
            <li>
                <a href="https://www.sofascore.com/">Sofascore</a>
            </li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML structure</h1>
        <section>
            <h2>Heading 1</h2>
            <p>This is Heading number 1</p>
        </section>
        <section>
            <h2>Heading 2</h2>
            <p>This is heading number 2</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/aba-nigeria/800x500/aba-nigeria-temple-lds-1636397-wallpaper.jpg"
          alt="Nigeria temple" width="200">
    </aside>
    <footer>
        <p>Ivan Veršić</p>
    </footer>
</body>

</html>
